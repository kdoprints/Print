<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Fetch Label Maker</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Lato&family=Montserrat&family=Open+Sans&family=Oswald&family=Poppins&family=Roboto&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { margin: 0; padding: 0; background-color: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Toolbar Styling */
        .toolbar {
            background-color: #ffffff;
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .toolbar button, .toolbar select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .toolbar button:hover { background-color: #e9ecef; }
        
        .btn-primary { background-color: #007bff !important; color: white; border-color: #007bff !important; font-weight: bold; }
        .btn-primary:hover { background-color: #0056b3 !important; }
        .btn-success { background-color: #28a745 !important; color: white; border-color: #28a745 !important; font-weight: bold; }
        .btn-success:hover { background-color: #218838 !important; }

        /* Workspace & Printable Area */
        .workspace { flex-grow: 1; padding: 40px; overflow: auto; display: flex; justify-content: center; align-items: flex-start; }
        
        .page {
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .page.A4 { width: 210mm; height: 297mm; }
        .page.A5 { width: 148mm; height: 210mm; }
        .page.A6 { width: 105mm; height: 148mm; }

        /* Draggable Elements */
        .draggable {
            position: absolute;
            cursor: move;
            border: 1px dashed transparent;
            padding: 5px;
        }
        .draggable.selected { border-color: #007bff; background-color: rgba(0, 123, 255, 0.05); }
        
        .text-box { min-width: 50px; min-height: 20px; font-size: 16px; white-space: pre-wrap; }
        .text-box:focus { outline: none; border-color: #007bff; cursor: text; background-color: white; }
        
        #labelAddressText { top: 20px; left: 20px; font-size: 16px; font-weight: 600; min-width: 200px; }
        #qrContainer { top: 20px; right: 20px; background: white; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; box-shadow: none; }
            .draggable { border: none !important; background-color: transparent !important; }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <strong>Label Maker</strong>
        <button class="btn-primary" onclick="downloadPDF()">Download PDF</button>
        <button class="btn-success" onclick="printDoc()">Print</button>
        
        <div style="width: 1px; height: 30px; background: #ccc; margin: 0 10px;"></div>
        
        <button onclick="addBox()">+ Add Extra Box</button>
        
        <select id="pageSize" onchange="changePageSize()">
            <option value="A6">A6 Size</option>
            <option value="A5">A5 Size</option>
            <option value="A4">A4 Size</option>
        </select>

        <select id="fontSelect" onchange="applyStyle('fontFamily', this.value)">
            <option value="'Roboto', sans-serif">Roboto</option>
            <option value="'Poppins', sans-serif">Poppins</option>
            <option value="Arial, sans-serif">Arial</option>
        </select>

        <button onclick="applyStyle('textAlign', 'left')">Align Left</button>
        <button onclick="applyStyle('textAlign', 'center')">Align Center</button>
        <button onclick="changeSize(2)">A+</button>
        <button onclick="changeSize(-2)">A–</button>
        <button onclick="toggleBold()">Bold</button>
    </div>

    <div class="workspace" id="workspace">
        <div id="printArea" class="page A6">
            <div id="labelAddressText" class="draggable text-box" onmousedown="dragElement(event, this)"></div>
            <div id="qrContainer" class="draggable" onmousedown="dragElement(event, this)">
                <canvas id="qr-code"></canvas>
            </div>
        </div>
    </div>

    <script>
        let selectedElement = null;
        let qr = new QRious({
            element: document.getElementById('qr-code'),
            size: 120,
            value: ''
        });

        // --- AUTO FETCH LOGIC ---
        window.onload = function() {
            // Read the URL parameters (e.g. ?order_id=123&address=ABC)
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id');
            const address = urlParams.get('address');

            // If parameters exist in the link, generate them instantly
            if (orderId || address) {
                generateFromData(orderId || '', address || '');
            } else {
                // If the page is opened normally without a link, show a placeholder warning
                generateFromData('NO-ORDER-ID', 'No address found.\nPlease open this page using a generated link with URL parameters.');
            }
        };

        function generateFromData(orderId, address) {
            let combinedTextForPrint = "";
            let combinedDataForBarcode = "";

            if (orderId) {
                combinedTextForPrint += "Order ID: " + orderId + "\n";
                combinedDataForBarcode += "Order ID: " + orderId + " | ";
            }
            if (address) {
                combinedTextForPrint += address;
                combinedDataForBarcode += "Address: " + address;
            }

            document.getElementById('labelAddressText').innerText = combinedTextForPrint;
            
            if (combinedDataForBarcode.trim() !== "") {
                qr.value = combinedDataForBarcode;
            }
        }

        // --- Drag, Select & Formatting Logic ---
        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('selected');
            selectedElement = el;
            if(el) el.classList.add('selected');
        }

        document.getElementById('workspace').addEventListener('mousedown', function(e) {
            if (e.target === this || e.target.id === 'printArea') selectElement(null);
        });

        function applyStyle(styleName, value) {
            if(selectedElement && selectedElement.classList.contains('text-box')) {
                selectedElement.style[styleName] = value;
            }
        }

        function changeSize(step) {
            if(selectedElement && selectedElement.classList.contains('text-box')) {
                let currentSize = window.getComputedStyle(selectedElement).fontSize;
                selectedElement.style.fontSize = (parseFloat(currentSize) + step) + 'px';
            }
        }

        function toggleBold() {
            if(selectedElement && selectedElement.classList.contains('text-box')) {
                let fw = window.getComputedStyle(selectedElement).fontWeight;
                selectedElement.style.fontWeight = (fw >= 600 || fw === 'bold') ? 'normal' : 'bold';
            }
        }

        function addBox() {
            const box = document.createElement('div');
            box.contentEditable = true;
            box.className = 'draggable text-box';
            box.innerText = 'Extra Box';
            box.style.top = '150px';
            box.style.left = '20px';
            box.onmousedown = (e) => {
                selectElement(box);
                if(e.target === box) dragElement(e, box);
            };
            document.getElementById('printArea').appendChild(box);
            selectElement(box);
        }

        document.getElementById('labelAddressText').onmousedown = function(e) {
            selectElement(this);
            if(e.target === this) dragElement(e, this);
        };

        function dragElement(e, elmnt) {
            if(document.activeElement === elmnt && elmnt.contentEditable === "true") return;
            e.preventDefault();
            selectElement(elmnt);
            let pos1 = 0, pos2 = 0, pos3 = e.clientX, pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }
            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        function changePageSize() {
            document.getElementById('printArea').className = 'page ' + document.getElementById('pageSize').value;
        }

        function printDoc() { selectElement(null); window.print(); }

        function downloadPDF() {
            selectElement(null);
            const opt = {
                margin: 0,
                filename: 'shipping-label.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: document.getElementById('pageSize').value.toLowerCase(), orientation: 'portrait' }
            };
            html2pdf().set(opt).from(document.getElementById('printArea')).save();
        }
    </script>
</body>
</html>

            </div>
            <div>
                <textarea id="addressInput" placeholder="Type full shipping address here..." oninput="updateLabelData()"></textarea>
            </div>
        </div>

        <button onclick="addBox()">+ Add Extra Text</button>
        
        <select id="pageSize" onchange="changePageSize()">
            <option value="A6">A6 Size (Standard Label)</option>
            <option value="A5">A5 Size</option>
            <option value="A4">A4 Size</option>

    <div class="workspace" id="workspace">
        <div id="printArea" class="page A6">
            
            <div id="labelAddressText" class="draggable" onmousedown="dragElement(event, this)"></div>

            <div id="qrContainer" class="draggable" onmousedown="dragElement(event, this)">
                <canvas id="qr-code"></canvas>
            </div>

        </div>
    </div>

    <script>
        let selectedElement = null;
        let qr = new QRious({
            element: document.getElementById('qr-code'),
            size: 120,
            value: ''
        });

        // Function that runs automatically when typing in the Order or Address boxes
        function updateLabelData() {
            let orderId = document.getElementById('orderIdInput').value;
            let address = document.getElementById('addressInput').value;
            
            // 1. Combine the data
            let combinedTextForPrint = "";
            let combinedDataForBarcode = "";

            if (orderId) {
                combinedTextForPrint += "Order ID: " + orderId + "\n";
                combinedDataForBarcode += "Order ID: " + orderId + " | ";
            }
            if (address) {
                combinedTextForPrint += address;
                combinedDataForBarcode += "Address: " + address;
            }

            // 2. Update the text visible on the label
            document.getElementById('labelAddressText').innerText = combinedTextForPrint;

            // 3. Update the QR Code data instantly
            if (combinedDataForBarcode.trim() !== "") {
                qr.value = combinedDataForBarcode;
            } else {
                qr.value = ''; // Clears QR if boxes are empty
            }
        }

        // --- Dragging & Selection Logic Below ---

        function addBox() {
            const box = document.createElement('div');
            box.contentEditable = true;
            box.className = 'draggable text-box';
            box.innerText = 'Extra text...';
            box.style.top = '150px';
            box.style.left = '20px';
            
            box.onmousedown = (e) => {
                selectElement(box);
                if(e.target === box) dragElement(e, box);
            };
            
            document.getElementById('printArea').appendChild(box);
            selectElement(box);
        }

        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('selected');
            selectedElement = el;
            if(el) el.classList.add('selected');
        }

        document.getElementById('workspace').addEventListener('mousedown', function(e) {
            if (e.target === this || e.target.id === 'printArea') {
                selectElement(null);
            }
        });

        function dragElement(e, elmnt) {
            // Prevent dragging if editing a text box
            if(document.activeElement === elmnt && elmnt.contentEditable === "true") return;
            
            e.preventDefault();
            selectElement(elmnt);
            let pos1 = 0, pos2 = 0, pos3 = e.clientX, pos4 = e.clientY;

            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        function changePageSize() {
            const area = document.getElementById('printArea');
            area.className = 'page ' + document.getElementById('pageSize').value;
        }

        function printDoc() {
            selectElement(null);
            window.print();
        }

        function downloadPDF() {
            selectElement(null);
            const element = document.getElementById('printArea');
            const pageSize = document.getElementById('pageSize').value.toLowerCase();
            
            const opt = {
                margin:       0,
                filename:     'shipping-label.pdf',
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: pageSize, orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>

        <input type="text" id="orderIdInput" placeholder="Enter Order ID for Barcode (e.g. 1001)" oninput="generateBarcode()">
        
        <select id="pageSize" onchange="changePageSize()">
            <option value="A4">A4 Size</option>

    <div class="workspace" id="workspace">
        <div id="printArea" class="page A4">
            
            <div id="barcodeContainer" onmousedown="dragElement(event, this)">
                <svg id="shipping-barcode"></svg>
            </div>

        </div>
    </div>

    <script>
        let selectedElement = null;

        // Function to create a new text box
        function addBox() {
            const box = document.createElement('div');
            box.contentEditable = true;
            box.className = 'text-box';
            box.innerText = 'Type here...';
            box.style.top = '100px';
            box.style.left = '100px';
            box.style.fontFamily = document.getElementById('fontSelect').value;
            
            // Handle Selection
            box.onmousedown = (e) => {
                selectElement(box);
                if(e.target === box) dragElement(e, box);
            };
            
            document.getElementById('printArea').appendChild(box);
            selectElement(box);
        }

        // Selection Logic
        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('selected');
            selectedElement = el;
            if(el) el.classList.add('selected');
        }

        // Deselect when clicking outside
        document.getElementById('workspace').addEventListener('mousedown', function(e) {
            if (e.target === this || e.target.id === 'printArea') {
                selectElement(null);
            }
        });

        // Make elements draggable
        function dragElement(e, elmnt) {
            // Don't drag if we are editing text
            if(document.activeElement === elmnt && elmnt.className.includes('text-box')) return;
            
            e.preventDefault();
            selectElement(elmnt);
            let pos1 = 0, pos2 = 0, pos3 = e.clientX, pos4 = e.clientY;

            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // Make Barcode Container selectable
        document.getElementById('barcodeContainer').addEventListener('mousedown', function(e) {
            selectElement(this);
        });

        // Text Formatting Functions
        function applyStyle(styleName, value) {
            if(selectedElement && selectedElement.classList.contains('text-box')) {
                selectedElement.style[styleName] = value;
            }
        }

        function changeSize(step) {
            if(selectedElement && selectedElement.classList.contains('text-box')) {
                let currentSize = parseInt(window.getComputedStyle(selectedElement).fontSize);
                selectedElement.style.fontSize = (currentSize + step) + 'px';
            }
        }

        function toggleBold() {
            if(selectedElement && selectedElement.classList.contains('text-box')) {
                let fw = window.getComputedStyle(selectedElement).fontWeight;
                selectedElement.style.fontWeight = (fw >= 600 || fw === 'bold') ? 'normal' : 'bold';
            }
        }

        // Change Page Size
        function changePageSize() {
            const area = document.getElementById('printArea');
            area.className = 'page ' + document.getElementById('pageSize').value;
        }

        // Generate Barcode Logic
        function generateBarcode() {
            let orderNumber = document.getElementById("orderIdInput").value;
            let barcodeSvg = document.getElementById("shipping-barcode");
            
            if (orderNumber.trim() !== "") {
                JsBarcode("#shipping-barcode", orderNumber, {
                    format: "CODE128",
                    width: 2,
                    height: 50,
                    displayValue: true,
                    fontSize: 16,
                    margin: 5
                });
            } else {
                barcodeSvg.innerHTML = "";
            }
        }

        // Print Document
        function printDoc() {
            selectElement(null); // Remove selection boxes
            window.print();
        }

        // Download PDF
        function downloadPDF() {
            selectElement(null); // Remove selection boxes
            const element = document.getElementById('printArea');
            const pageSize = document.getElementById('pageSize').value.toLowerCase();
            
            // Configuration for html2pdf
            const opt = {
                margin:       0,
                filename:     'shipping-label.pdf',
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: pageSize, orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
