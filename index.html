<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Upload & Gallery</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f4f9; }
        header { background: #333; color: white; padding: 15px; text-align: center; }
        nav { display: flex; justify-content: center; background: #444; }
        nav button { background: none; border: none; color: white; padding: 15px 30px; cursor: pointer; font-size: 16px; }
        nav button.active { background: #555; font-weight: bold; }
        
        .section { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .section.active { display: block; }

        /* Camera UI */
        #camera-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; border-radius: 10px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        #snap-btn { display: block; width: 100%; padding: 15px; background: #28a745; color: white; border: none; font-size: 18px; cursor: pointer; }
        
        /* Preview & Upload */
        #preview-tray { display: flex; gap: 10px; overflow-x: auto; margin-top: 15px; padding-bottom: 10px; }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; border: 2px solid #ccc; }
        #upload-btn { display: none; width: 100%; padding: 15px; background: #007bff; color: white; border: none; font-size: 18px; cursor: pointer; margin-top: 10px; border-radius: 5px;}

        /* Gallery */
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        #gallery-grid img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header>
        <h2>Photo Hub</h2>
    </header>

    <nav>
        <button id="tab-camera" class="active" onclick="switchTab('camera')">Camera</button>
        <button id="tab-gallery" onclick="switchTab('gallery')">Gallery</button>
    </nav>

    <div id="camera-section" class="section active">
        <div id="camera-container">
            <video id="videoElement" autoplay playsinline></video>
        </div>
        <button id="snap-btn" onclick="takePhoto()">📸 Click Photo</button>
        
        <div id="preview-tray"></div>
        <button id="upload-btn" onclick="uploadPhotos()">Upload All to GitHub</button>
        
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div id="gallery-section" class="section">
        <button onclick="loadGallery()" style="margin-bottom: 15px; padding: 10px;">Refresh Gallery</button>
        <div id="gallery-grid">
            </div>
    </div>

    <script>
        // Configuration
        const GITHUB_REPO_OWNER = "YOUR_GITHUB_USERNAME";
        const GITHUB_REPO_NAME = "YOUR_REPO_NAME";
        const GITHUB_FOLDER_PATH = "images"; // Folder where images are saved
        
        // Use a Webhook URL (like n8n) to safely handle the actual upload
        const BACKEND_WEBHOOK_URL = "YOUR_SECURE_WEBHOOK_URL_HERE"; 

        let video = document.getElementById('videoElement');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let previewTray = document.getElementById('preview-tray');
        let uploadBtn = document.getElementById('upload-btn');
        let capturedPhotos = []; // Array to hold base64 strings

        // Tab Switching Logic
        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`${tab}-section`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');

            if(tab === 'camera') startCamera();
            if(tab === 'gallery') {
                stopCamera();
                loadGallery();
            }
        }

        // Camera Logic
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } // Uses back camera on phones
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Error accessing camera: " + err.message);
            }
        }

        function stopCamera() {
            if(video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        // Take Photo
        function takePhoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to Base64
            let base64Data = canvas.toDataURL('image/jpeg', 0.8);
            capturedPhotos.push(base64Data);

            // Add to Preview Tray
            let img = document.createElement('img');
            img.src = base64Data;
            img.className = 'preview-img';
            previewTray.appendChild(img);

            uploadBtn.style.display = 'block'; // Show upload button
        }

        // Upload Logic
        async function uploadPhotos() {
            if(capturedPhotos.length === 0) return;
            uploadBtn.innerText = "Uploading...";
            uploadBtn.disabled = true;

            for (let i = 0; i < capturedPhotos.length; i++) {
                let base64Image = capturedPhotos[i].split(',')[1]; // Remove "data:image/jpeg;base64,"
                let filename = `photo_${Date.now()}_${i}.jpg`;

                // Send the image to your secure backend webhook
                try {
                    await fetch(BACKEND_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            filename: filename,
                            image_base64: base64Image
                        })
                    });
                } catch (error) {
                    console.error("Upload failed for " + filename, error);
                }
            }

            alert("Upload Complete!");
            capturedPhotos = []; // Clear array
            previewTray.innerHTML = ""; // Clear previews
            uploadBtn.style.display = 'none';
            uploadBtn.innerText = "Upload All to GitHub";
            uploadBtn.disabled = false;
        }

        // Gallery Logic
        async function loadGallery() {
            const galleryGrid = document.getElementById('gallery-grid');
            galleryGrid.innerHTML = "Loading...";

            try {
                // Fetch list of files from GitHub API
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/contents/${GITHUB_FOLDER_PATH}`);
                const files = await response.json();
                
                galleryGrid.innerHTML = ""; // Clear loading text

                if (Array.isArray(files)) {
                    // Filter for images and render them
                    const imageFiles = files.filter(file => file.name.match(/\.(jpg|jpeg|png|gif)$/i));
                    
                    imageFiles.forEach(file => {
                        let img = document.createElement('img');
                        // Use raw.githubusercontent or a CDN like jsDelivr to display the image
                        img.src = `https://raw.githubusercontent.com/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/main/${file.path}`;
                        galleryGrid.appendChild(img);
                    });
                } else {
                    galleryGrid.innerHTML = "No images found or repository is private.";
                }
            } catch (error) {
                galleryGrid.innerHTML = "Error loading gallery.";
                console.error(error);
            }
        }

        // Start camera on initial load
        startCamera();
    </script>
</body>
</html>
